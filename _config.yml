description: Sales Engineer at Bravo Technology (Z) Ltd, specialising in SCADA, IoT, fleet telematics, and network infrastructure.
baseurl: ""
url: "https://n3gus.github.io"

# Build settings
markdown: kramdown
theme: minima
plugins:
