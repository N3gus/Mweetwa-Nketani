# Site settings
title: "Mweetwa Mweembo Nketani | Sales Engineer"
description: "Sales Engineer at Bravo Technology (Z) Ltd, specialising in SCADA, IoT, fleet telematics, and network infrastructure for mining and utilities clients across Zambia."
url: "https://n3gus.github.io"
baseurl: "/Mweetwa-Nketani"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - README.md

# Include from processing
include:
  - _pages

# Sass configuration
sass:
  sass_dir: _sass
  style: compressed
  sourcemap: never

# Collections
collections:
  projects:
    output: true
    permalink: /:collection/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# SEO
twitter:
  username: yourusername
  card: summary

social:
  name: Mweetwa Mweembo Nketani
  links:
    - https://www.linkedin.com/in/mweetwa-nketani-a62825212/?lipi=urn%3Ali%3Apage%3Ad_flagship3_feed%3BcQ2swKzPSM%2Bw9QRRQQ5OvA%3D%3D
    - https://github.com/N3gus

# Google Analytics (optional)
google_analytics: # UA-XXXXXXXXX-X

# GitHub Pages specific
github: [metadata]
